{% extends 'core/main.html' %}

{% block title %}Settings{% endblock %}

{% block extra_head %}
<!-- Instantly apply theme before page paints -->
<script>
  (function () {
    const userPref = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = userPref === 'dark' || (userPref === null && prefersDark);
    if (isDark) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  })();
</script>
{% endblock %}

{% block content %}
<div 
  x-data="themeSwitcher()" 
  x-init="init()" 
  class="container mx-auto px-4 py-6 transition-colors duration-300"
>
  <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">Settings</h2>

  <div class="space-y-4">
    <!-- General Settings -->
    <div 
      x-data="{ open: true }" 
      class="bg-white dark:bg-gray-800 rounded-lg shadow emboss-effect p-5 transition-colors duration-300"
    >
      <button 
        @click="open = !open" 
        class="w-full text-left text-lg font-semibold text-green-700 dark:text-green-400 bg-green-100 dark:bg-green-900 px-4 py-3 rounded hover:bg-green-200 dark:hover:bg-green-800 transition"
      >
        General Settings
      </button>

      <div x-show="open" x-cloak class="mt-3 pl-4 space-y-4">
        <!-- Appearance Switch -->
        <div class="flex items-center justify-between bg-green-50 dark:bg-gray-700 px-4 py-2 rounded transition">
          <span class="text-green-800 dark:text-green-300">Appearance (Light/Dark Mode)</span>
          <label class="inline-flex items-center cursor-pointer">
            <input 
              type="checkbox" 
              :checked="darkMode" 
              @change="toggleTheme" 
              class="sr-only peer"
            >
            <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-gray-600 peer-checked:bg-green-600 relative transition-all duration-300">
              <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-all peer-checked:translate-x-5"></div>
            </div>
          </label>
        </div>

        <button class="w-full text-left bg-green-50 dark:bg-gray-700 text-green-800 dark:text-green-300 hover:bg-green-100 dark:hover:bg-gray-600 px-4 py-2 rounded transition">
          About Developers
        </button>
      </div>
    </div>

    <!-- Terms of Use -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow emboss-effect p-5 transition-colors duration-300">
      <button class="w-full text-left text-lg font-semibold text-green-700 dark:text-green-400 bg-green-100 dark:bg-green-900 px-4 py-3 rounded hover:bg-green-200 dark:hover:bg-green-800 transition">
        Terms of Use
      </button>
    </div>

    <!-- Privacy & Cookies -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow emboss-effect p-5 transition-colors duration-300">
      <button class="w-full text-left text-lg font-semibold text-green-700 dark:text-green-400 bg-green-100 dark:bg-green-900 px-4 py-3 rounded hover:bg-green-200 dark:hover:bg-green-800 transition">
        Privacy & Cookies
      </button>
    </div>
  </div>
</div>

<!-- Alpine.js -->
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

<!-- Theme switcher -->
<script>
  function themeSwitcher() {
    return {
      darkMode: false,
      init() {
        // Read from <html> tag to sync switch state
        this.darkMode = document.documentElement.classList.contains('dark');
      },
      toggleTheme() {
        this.darkMode = !this.darkMode;
        localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
        document.documentElement.classList.toggle('dark', this.darkMode);
      }
    }
  }
</script>

<style>
  [x-cloak] { display: none !important; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .animate-float {
    animation: float 3s ease-in-out infinite;
  }
  .emboss-effect {
    box-shadow:
      inset 2px 2px 5px rgba(255,255,255,0.7),
      inset -2px -2px 5px rgba(0,0,0,0.1);
  }
  .emboss-text {
    text-shadow:
      1px 1px 0 #fff,
     -1px -1px 0 #999;
  }
</style>
{% endblock %}
