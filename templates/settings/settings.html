{% extends 'core/main.html' %} 
{% block title %}Settings{% endblock %}
{% block content %}
<div class = "container">
  <!-- Settings Form -->
    <div class = "settings-container" style = "font-family: 'Poppins', sans-serif; max-width: 600px; background: #ffffff; padding: 20px 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
      <h2 style = "border-bottom: 2px solid #008000; padding-bottom: 8px;">Settings</h2>
      <form id="settingsForm">
      <!-- Theme Button -->
      <div class="settings-theme" style="padding-top: 8px;">
        <label for="theme" style="padding-right: 10px;">Theme</label>
          <select id="theme" name="theme" class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"> <!--style="border: #D1D5DB; border-radius: 5px;">-->
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
      </div>

      <!-- Language Selection -->
      <div class = "settings-language" style="padding-top: 8px;">
        <label for="language" style="padding-right: 10px;">Language</label>
          <select id="language" name="language" class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            <option value="en" selected>English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
      </div>

      <!-- Notifications Button -->
      <div class="setting-notifs" style="padding-top: 8px;">
        <label class="toggle-label">
          <input type="checkbox" id="notifications" style="margin-right: 10px;" checked />
            Enable Notifications
          </label>
      </div>

      <button type="submit" class="mt-4 px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
            Save Preferences
      </button>
      <div class="success-msg text-green-600 font-medium mt-2 hidden" id="successMsg">
          Settings saved successfully!
      </div>
      </form>
    </div>
</div>

{% endblock %}
