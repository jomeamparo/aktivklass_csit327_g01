<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preferences</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f4f7fa;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .preferences-container {
      width: 100%;
      max-width: 600px;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #444;
    }

    input[type="text"], input[type="email"], select, input[type="checkbox"], button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #45a049;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
    }

    /* Responsive Layout */
    @media (max-width: 768px) {
      .preferences-container {
        padding: 15px;
      }

      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="preferences-container">
    <h2>User Preferences</h2>
    <form>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label for="language">Language Preference</label>
        <select id="language" name="language">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
        </select>
      </div>
      <div class="form-group checkbox-group">
        <label for="notifications">Notification Preferences</label>
        <label><input type="checkbox" id="emailNotifications" name="emailNotifications"> Email Notifications</label>
        <label><input type="checkbox" id="smsNotifications" name="smsNotifications"> SMS Notifications</label>
        <label><input type="checkbox" id="pushNotifications" name="pushNotifications"> Push Notifications</label>
      </div>
      <div class="form-group">
        <button type="submit">Save Preferences</button>
      </div>
    </form>
  </div>
</body>
</html>
