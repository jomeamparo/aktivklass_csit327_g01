{% extends 'base.html' %}
{% block content %}
<h2>{{ class.subject.title }} - {{ class.section }}</h2>
<p><strong>Description:</strong> {{ class.subject.description }}</p>
<p><strong>Schedule:</strong> {{ class.schedule }}</p>

<form method="post" action="{% url 'join_class' class_id=class.id %}">
    {% csrf_token %}
    <button type="submit">Join Class</button>
</form>

<a href="{% url 'class_list' %}">← Back to class list</a>
{% endblock %}
